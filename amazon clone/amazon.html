<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#e3e6e6;
}

/* NAVBAR */

.navbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
flex-wrap:wrap;
}

.logo{
font-size:30px;
font-weight:bold;
color:#ff9900;
}

.search-box{
display:flex;
flex:1;
margin:0 20px;
max-width:700px;
}

.search-box input{
width:100%;
padding:10px;
border:none;
outline:none;
}

.search-box button{
background:#febd69;
border:none;
padding:10px 20px;
cursor:pointer;
}

.cart{
font-size:20px;
cursor:pointer;
}

/* MENU */

.menu{
background:#232f3e;
color:white;
padding:10px;
display:flex;
gap:20px;
overflow-x:auto;
}

.menu a{
text-decoration:none;
color:white;
}

/* HERO */

.hero{
height:350px;
background:url("https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=1600")
center/cover;
display:flex;
align-items:flex-end;
justify-content:center;
padding-bottom:30px;
}

.hero-text{
background:white;
padding:15px;
width:80%;
text-align:center;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
}

.product h3{
margin:10px 0;
}

.product p{
color:green;
font-size:20px;
margin-bottom:10px;
}

.product button{
background:#ffd814;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

/* FOOTER */

footer{
background:#131921;
color:white;
text-align:center;
padding:20px;
margin-top:20px;
}

/* MOBILE */

@media(max-width:768px){

.navbar{
flex-direction:column;
gap:10px;
}

.search-box{
width:100%;
margin:10px 0;
}

.hero{
height:220px;
}

.hero-text{
width:95%;
font-size:14px;
}
}

</style>
</head>
<body>

<!-- NAVBAR -->

<div class="navbar">
<div class="logo">amazon</div>

<div class="search-box">
<input type="text" placeholder="Search Amazon">
<button>🔍</button>
</div>

<div class="cart">
🛒 Cart (<span id="cartCount">0</span>)
</div>
</div>

<!-- MENU -->

<div class="menu">
<a href="#">Today's Deals</a>
<a href="#">Mobiles</a>
<a href="#">Fashion</a>
<a href="#">Electronics</a>
<a href="#">Home</a>
<a href="#">Books</a>
<a href="#">Prime</a>
</div>

<!-- HERO -->

<div class="hero">
<div class="hero-text">
Welcome to Amazon Clone Project
</div>
</div>

<!-- PRODUCTS -->

<div class="products">

<div class="product">
<img src="https://picsum.photos/300/220?1">
<h3>Smart Watch</h3>
<p>₹1,999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/220?2">
<h3>Headphones</h3>
<p>₹999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/220?3">
<h3>Sports Shoes</h3>
<p>₹2,499</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/220?4">
<h3>Laptop Bag</h3>
<p>₹799</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/220?5">
<h3>Bluetooth Speaker</h3>
<p>₹1,299</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://picsum.photos/300/220?6">
<h3>Mobile Cover</h3>
<p>₹299</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</div>

<footer>
<p>© 2026 Amazon Clone | Developed using HTML, CSS & JavaScript</p>
</footer>

<script>

let cart = 0;

function addCart(){
cart++;
document.getElementById("cartCount").innerHTML = cart;
}

</script>

</body>
</html>
